name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock
          npm ci

      - name: Compile Python modules
        run: |
          python -m py_compile \
            app/main.py \
            app/settings.py \
            app/repository.py \
            app/models.py \
            app/services/jd_strategy.py \
            app/services/ncs_mcp_client.py \
            app/services/question_generation.py \
            app/services/kordoc_parser.py \
            app/services/external_api.py \
            scripts/benchmark_alio_jd.py

      - name: Run tests
        env:
          NCS_MCP_URL: http://mcp.example/mcp
          OPENAI_NET_CHECK_ENABLED: "false"
        run: python -m pytest -q
